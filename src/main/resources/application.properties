spring.main.banner-mode=off
spring.application.name=loterias-caixa

server.port=8080

# servicebus2 e mais estavel; servicebus3 atualiza o resultado do dia mais rapido
caixa.api.base-url=${CAIXA_API_BASE_URL:https://servicebus2.caixa.gov.br/portaldeloterias/api/}

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

spring.data.mongodb.authentication-database=admin
spring.data.mongodb.username=${MONGODB_USERNAME:admin}
spring.data.mongodb.password=${MONGODB_PASSWORD:loterias123}
spring.data.mongodb.database=${MONGODB_DATABASE:loterias}
spring.data.mongodb.port=${MONGODB_PORT:27017}
spring.data.mongodb.host=${MONGODB_HOST:localhost}
