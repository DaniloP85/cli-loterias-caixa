version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: loterias-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: loterias123
      MONGO_INITDB_DATABASE: loterias
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - loterias-network

  loterias-downloader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loterias-downloader
    depends_on:
      - mongodb
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=loterias
      - MONGODB_USERNAME=admin
      - MONGODB_PASSWORD=loterias123
    volumes:
      # Se você quiser salvar os arquivos baixados localmente
      - ./downloads:/app/downloads
    networks:
      - loterias-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  loterias-network:
    driver: bridge