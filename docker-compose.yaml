services:
  mongodb:
    image: mongo:7.0
    container_name: loterias-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: loterias123
      MONGO_INITDB_DATABASE: loterias
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - loterias-network

  loterias-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loterias-web
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=loterias
      - MONGODB_USERNAME=admin
      - MONGODB_PASSWORD=loterias123
      # Troque para o servicebus3 (atualiza o resultado do dia mais rápido, porém menos estável):
      # - CAIXA_API_BASE_URL=https://servicebus3.caixa.gov.br/portaldeloterias/api/
    networks:
      - loterias-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  loterias-network:
    driver: bridge
